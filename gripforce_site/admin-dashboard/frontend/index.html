<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GripForce Admin · Connexion</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="dark">
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 40 40" width="48" height="48"><circle cx="20" cy="20" r="7" fill="currentColor"/><circle cx="20" cy="6" r="2.5" fill="currentColor"/><circle cx="32" cy="13" r="2.5" fill="currentColor"/><circle cx="32" cy="27" r="2.5" fill="currentColor"/><circle cx="20" cy="34" r="2.5" fill="currentColor"/><circle cx="8" cy="27" r="2.5" fill="currentColor"/><circle cx="8" cy="13" r="2.5" fill="currentColor"/></svg>
      <span class="login-brand">GripForce <span>Admin</span></span>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label for="username">Utilisateur</label>
        <input type="text" id="username" placeholder="trex ou mmk" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="login-error" class="form-error hidden">Identifiants invalides</div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>
  </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
